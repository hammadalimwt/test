<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | E-Commerce</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar (copy from index.html) -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="index.html">🛒 ShopHive</a>
            </div>
            <div class="hamburger" id="hamburger">☰</div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="cart.html">Cart <span class="badge" id="cartBadge">0</span></a></li>
                <li><a href="wishlist.html">Wishlist <span class="badge" id="wishlistBadge">0</span></a></li>
                <li id="authLinks">
                    <a href="login.html" class="btn-outline">Login</a>
                    <a href="signup.html" class="btn-primary">Signup</a>
                </li>
                <li id="userMenu" style="display: none;">
                    <span id="welcomeUser">Hi, User</span>
                    <button id="logoutBtn" class="btn-logout">Logout</button>
                </li>
                <li>
                    <button id="darkModeToggle" class="theme-toggle">🌙 Dark</button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="auth-container">
        <div class="auth-box">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-primary auth-btn">Login</button>
                <p class="auth-link">Don't have account? <a href="signup.html">Signup</a></p>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
