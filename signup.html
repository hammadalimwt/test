<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | E-Commerce</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar (same as login) -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="index.html">🛒 ShopHive</a>
            </div>
            <div class="hamburger" id="hamburger">☰</div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="cart.html">Cart <span class="badge" id="cartBadge">0</span></a></li>
                <li><a href="wishlist.html">Wishlist <span class="badge" id="wishlistBadge">0</span></a></li>
                <li id="authLinks">
                    <a href="login.html" class="btn-outline">Login</a>
                    <a href="signup.html" class="btn-primary">Signup</a>
                </li>
                <li id="userMenu" style="display: none;">
                    <span id="welcomeUser">Hi, User</span>
                    <button id="logoutBtn" class="btn-logout">Logout</button>
                </li>
                <li>
                    <button id="darkModeToggle" class="theme-toggle">🌙 Dark</button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Signup Form -->
    <div class="auth-container">
        <div class="auth-box">
            <h2>Sign Up</h2>
            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Create password">
                </div>
                <button type="submit" class="btn-primary auth-btn">Sign Up</button>
                <p class="auth-link">Already have account? <a href="login.html">Login</a></p>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
